name: Build and Deploy docs to DigitalOcean

# Mirrors the masumi-network/masumi-docs deploy workflow: build the Next.js
# app, bake a Docker image, push to DO Container Registry, then explicitly
# trigger a DO App Platform deployment. Explicit is better than relying on
# DO's "auto-deploy on registry push" behaviour — it always runs, produces
# clear logs, and fails the CI run if the deployment itself fails.
#
# Triggers:
#   - push to `main`         → prod image + DO_APP_ID_PROD deployment
#   - workflow_dispatch (UI) → staging image + DO_APP_ID_TEST deployment
#                              (ref is the branch chosen in the "Run workflow" picker)
#
# Required repo secrets:
#   DIGITALOCEAN_ACCESS_TOKEN  DO API token with registry write + apps.update
#   DO_REGISTRY_NAME           e.g. "masumi-network"
#   DO_APP_ID_PROD             App Platform app ID for the prod docs app
#   DO_APP_ID_TEST             App Platform app ID for the staging docs app
#                              (only required if you trigger via workflow_dispatch)

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions: {}

jobs:
  build-and-deploy:
    name: Build, push, and deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: docs

    env:
      REGISTRY: registry.digitalocean.com
      # Index secrets by name — do NOT use `cond && secrets.PROD || secrets.TEST`:
      # an empty/missing PROD secret is falsy and would wrongly fall through to TEST on main.
      APP_ID: ${{ secrets[github.ref == 'refs/heads/main' && 'DO_APP_ID_PROD' || 'DO_APP_ID_TEST'] }}
      IMAGE_NAME: ${{ secrets.DO_REGISTRY_NAME }}/${{ github.ref == 'refs/heads/main' && 'masumi-identity-sdk-docs' || 'masumi-identity-sdk-docs-staging' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Clean previous build artifacts
        run: rm -rf .source .contentlayer .content-collections .next

      - name: Build Next.js app (validation pass)
        run: npm run build

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Log in to DigitalOcean Container Registry
        run: doctl registry login --expiry-seconds 1200

      - name: Build and push Docker image
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            .
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Trigger DO App Platform deployment
        # `doctl apps create-deployment` re-deploys using the app's existing
        # spec, which pulls the freshly-pushed `:latest` image from the
        # registry. `--wait` blocks so the CI run fails loudly if the
        # deploy itself fails.
        working-directory: .
        run: doctl apps create-deployment "${{ env.APP_ID }}" --wait
